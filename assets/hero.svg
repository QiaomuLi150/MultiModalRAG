      <rect x="280" y="275" width="140" height="40" rx="20" fill="#1E3A5F"/>
      <text x="302" y="301" fill="#D7F3FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Hybrid RAG</text>
