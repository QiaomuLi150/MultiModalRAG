<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MultiModalRAG hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111E"/>
      <stop offset="0.45" stop-color="#0B1730"/>
      <stop offset="1" stop-color="#152B4F"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 95) rotate(40) scale(260 180)">
      <stop stop-color="#33D6FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#33D6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1330 140) rotate(140) scale(320 220)">
      <stop stop-color="#FF9F43" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FF9F43" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#163153"/>
      <stop offset="1" stop-color="#0E1E34"/>
