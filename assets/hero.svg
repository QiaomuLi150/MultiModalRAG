      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="420" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="420" rx="36" fill="url(#glow1)"/>
  <rect width="1600" height="420" rx="36" fill="url(#glow2)"/>

  <g opacity="0.18">
