    <circle cx="1276" cy="338" r="2" fill="#D7F3FF"/>
    <circle cx="1356" cy="286" r="3" fill="#D7F3FF"/>
    <circle cx="1430" cy="334" r="2" fill="#D7F3FF"/>
    <circle cx="84" cy="336" r="2" fill="#D7F3FF"/>
    <circle cx="142" cy="290" r="3" fill="#D7F3FF"/>
    <circle cx="210" cy="342" r="2" fill="#D7F3FF"/>
