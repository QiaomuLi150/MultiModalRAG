<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Formal evaluation snapshot">
  <defs>
    <linearGradient id="board" x1="0" y1="0" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36C2FF"/>
      <stop offset="1" stop-color="#2A6FF2"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#62E6B1"/>
      <stop offset="1" stop-color="#0FB37A"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB35E"/>
      <stop offset="1" stop-color="#FF7A45"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1D4D8F" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="560" rx="28" fill="url(#board)"/>
  <text x="80" y="86" fill="#102542" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.8">
    Formal benchmark snapshot
  </text>
  <text x="80" y="126" fill="#5C6F86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">
    BEIR text retrieval plus DocVQA visual QA, with reranking and vision-first answers
  </text>

  <g filter="url(#soft)">
    <rect x="80" y="170" width="456" height="300" rx="26" fill="#FFFFFF"/>
    <rect x="572" y="170" width="456" height="300" rx="26" fill="#FFFFFF"/>
    <rect x="1064" y="170" width="456" height="300" rx="26" fill="#FFFFFF"/>
  </g>

  <text x="112" y="220" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">BEIR nfcorpus</text>
  <text x="112" y="254" fill="#627086" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Best: Text Hybrid + MiniLM-L4</text>
  <rect x="112" y="286" width="360" height="18" rx="9" fill="#EAF2FF"/>
  <rect x="112" y="286" width="260" height="18" rx="9" fill="url(#bar1)"/>
  <text x="112" y="340" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">hit@5 0.610</text>
  <text x="112" y="372" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">mrr@5 0.570</text>
  <text x="112" y="412" fill="#627086" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Reliable text retrieval baseline</text>

  <text x="604" y="220" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">BEIR trec-covid</text>
  <text x="604" y="254" fill="#627086" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Best: Text Hybrid + MiniLM-L4</text>
  <rect x="604" y="286" width="360" height="18" rx="9" fill="#EAF9F2"/>
  <rect x="604" y="286" width="344" height="18" rx="9" fill="url(#bar2)"/>
  <text x="604" y="340" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">hit@5 0.960</text>
  <text x="604" y="372" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">mrr@5 0.890</text>
  <text x="604" y="412" fill="#627086" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Strong ranking on a different corpus mix</text>

  <text x="1096" y="220" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">DocVQA answer quality</text>
  <text x="1096" y="254" fill="#627086" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Best: Visual Page + Text Hybrid + MiniLM-L4</text>
  <rect x="1096" y="286" width="360" height="18" rx="9" fill="#FFF1E5"/>
  <rect x="1096" y="286" width="270" height="18" rx="9" fill="url(#bar3)"/>
  <text x="1096" y="340" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">exact 0.350</text>
  <text x="1096" y="372" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">token F1 0.568</text>
  <text x="1096" y="404" fill="#18324F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">ANLS 0.729</text>
  <text x="1096" y="442" fill="#627086" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Vision-first answer path is now competitive</text>

  <g opacity="0.85">
    <circle cx="1390" cy="82" r="6" fill="#36C2FF"/>
    <circle cx="1414" cy="82" r="6" fill="#62E6B1"/>
    <circle cx="1438" cy="82" r="6" fill="#FFB35E"/>
  </g>
</svg>
